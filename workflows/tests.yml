# Runs the test suite automatically on every push to main.
#
# PLAIN ENGLISH: right now the tests only run when Itachi runs them by hand.
# This makes GitHub run all 18 suites itself every time you upload a file.
# If something breaks, you get a red X on the commit and an email — before
# anyone opens the site. Nothing here touches the live site; it only checks.
name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get the code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install test tools
        run: npm install --no-audit --no-fund

      - name: Install the browser the tests drive
        run: npx playwright install --with-deps chromium

      - name: Run all suites
        run: npm test
